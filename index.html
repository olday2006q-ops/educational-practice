<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Мои задачи</h1>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Добавить новую задачу..." autocomplete="off">
            <button id="addBtn">Добавить</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <ul id="todoList"></ul>

        <div class="stats">
            <span id="itemsLeft">0 задач осталось</span>
            <button id="clearCompleted">Очистить выполненные</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
